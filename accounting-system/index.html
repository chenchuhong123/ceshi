<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单记账</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 简单记账</h1>
        
        <div class="summary">
            <div class="stat">
                <span>收入</span>
                <span id="totalIncome" class="income">¥0</span>
            </div>
            <div class="stat">
                <span>支出</span>
                <span id="totalExpense" class="expense">¥0</span>
            </div>
            <div class="stat">
                <span>结余</span>
                <span id="balance" class="balance">¥0</span>
            </div>
        </div>

        <form id="transactionForm" class="form">
            <select id="type" required>
                <option value="expense">支出</option>
                <option value="income">收入</option>
            </select>
            <input type="text" id="description" placeholder="描述" required>
            <input type="number" id="amount" placeholder="金额" min="0.01" step="0.01" required>
            <input type="date" id="date" required>
            <button type="submit">添加</button>
        </form>

        <div class="records">
            <h2>记录列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>类型</th>
                        <th>描述</th>
                        <th>金额</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="recordsTable">
                </tbody>
            </table>
            <p id="noRecords" class="no-records">暂无记录</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
